<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Volver"></ion-back-button>
    </ion-buttons>
    <ion-title>Detalle: {{ digimonName }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding" style="--background: #f4f5f8;">
  <div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    
    <ion-card *ngIf="digimonData" style="width: 100%; max-width: 400px; margin: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-radius: 16px; background: #ffffff;">
      
      <div style="width: 100%; height: 320px; display: flex; justify-content: center; align-items: center; background: #fafafa; border-bottom: 1px solid #f0f0f0; padding: 20px;">
        <img [src]="digimonData.img" 
             alt="{{ digimonData.name }}" 
             style="max-width: 100%; max-height: 100%; object-fit: contain; display: block;" />
      </div>
      
      <ion-card-header>
        <ion-card-title class="ion-text-center" style="font-size: 24px; font-weight: 800; color: #222428; margin-bottom: 4px;">
          {{ digimonData.name }}
        </ion-card-title>
      </ion-card-header>

      <ion-card-content style="padding: 0 20px 24px 20px;">
        <div style="background: #f9fafb; border-radius: 12px; padding: 16px; border: 1px solid #f3f4f6;">
          <p style="font-size: 15px; margin: 0 0 8px 0; color: #4e525a; display: flex; justify-content: space-between;">
            <strong>Name:</strong> <span>{{ digimonData.name }}</span>
          </p>
          <p style="font-size: 15px; margin: 0 0 8px 0; color: #4e525a; display: flex; justify-content: space-between;">
            <strong>Level:</strong> <span style="background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 6px; font-size: 13px; font-weight: bold;">{{ digimonData.level }}</span>
          </p>
          <p style="font-size: 13px; margin: 12px 0 0 0; color: #92949c; text-align: center; border-top: 1px dashed #e5e7eb; padding-top: 10px;">
            DigiDex ID: Registro Verificado 
          </p>
        </div>
      </ion-card-content>
    </ion-card>

    <div *ngIf="!digimonData" class="ion-text-center ion-padding" style="color: #92949c;">
      <p>No se encontraron detalles del personaje.</p>
    </div>
    
  </div>
</ion-content>
